<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAC | Controle de Insumos Hospitalares</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <header class="header-sistema">
          <h1>SENAC | Controle de Insumos Hospitalares</h1>
          <p>Gestão Eficiente: Enfermeira Camila</p>
        </header>

         <main class="container">   
           <section id="secao-estoque" class="secao-card">
               <!-- Formulário de cadastro  -->
            <div class="bloco-cadastro">
                <h5>+ Adicionar Novo Insumo ao Estoque</h5>
                <form id="form-cadastro-produto" class="form-cadastro-grid">
                       <input type="text" id="input-nome" class="campo-input" placeholder="Nome do Insumo" required>
                    <input type="text" id="novo-produto-unidade" class="campo-input" placeholder="Unid. Medida (ex: Unidade)" required>
                    <select id="novo-produto-categoria" class="campo-select" required>
                        <option value="Consumo">Consumo</option>
                        <option value="Permanente">Permanente</option>
                    </select>
                    <input type="number" id="input-quantidade" class="campo-input" placeholder="Qtd Inicial" required min="0">
                    <input type="date" id="novo-produto-data-entrada" class="campo-input" title="Data de Validade/Entrada">
                   
                    <button type="submit" id="btn-cadastrar" class="btn-acao btn-verde">Cadastrar</button>
                </form>
            </div>
 
            <!-- Tabela de estoque  -->
            <table class="tabela-custom">
                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Tipo</th>
                        <th>Unidade</th>
                        <th>Validade / Entrada</th>
                        <th>Estoque Atual</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-materiais"></tbody>
            </table>
        </section>

           <section id="secao-saida" class="secao-card oculto">
              <h3 class="titulo-secao">Registrar Saída / Baixa</h3>
                          <form id="form-movimentacao" class="form-vertical-bloco">
               <div class="grupo-campo">
                    <label class="rotulo">Material</label>
                    <select id="select-produto-saida" class="campo-select" required>
                        <option value="" disabled selected>Selecione um material</option>
                    </select>
                </div>
                  <div class="linha-campos-tripla">
                    <div class="grupo-campo">
                        <label class="rotulo">Quantidade para Baixa</label>
                        <input type="number" id="input-retirada" class="campo-input" required min="1">
                    </div>
                       </div>
                    <div class="grupo-campo">
                        <label class="rotulo">Instrutor Solicitante</label>
                        <input type="text" id="responsavel" class="campo-input" placeholder="Nome do Professor" required>
                    </div>
            </form>

            
        </section>
 

         </main>
          <script src="main.js"></script>
</body>
